<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family:sans-serif; padding:20px; background:#f5f5f5;">

  <script>
if(localStorage.getItem("adminAuth") !== "true"){
  window.location.href = "admin-login.html";
}
</script>

<h2>Review Analytics</h2>

<h2 style="text-align:center;"> Marketing Sennna Review Analytics </h2>

<div style="max-width:500px; margin:auto; background:white; padding:20px; border-radius:12px; box-shadow:0 5px 20px rgba(0,0,0,0.1);">

<canvas id="chart"></canvas>
 
<h3>Daily Report</h3>
<canvas id="dailyChart"></canvas>

  
<!-- 🔥 BUTTON SECTION -->
<div style="margin-top:20px; text-align:center;">

  <!-- PDF BUTTON -->
  <a 
  href="https://marketingsennna.onrender.com/report" 
  target="_blank"
  style="display:inline-block; margin:10px; padding:12px 20px; background:#3b82f6; color:white; text-decoration:none; border-radius:8px; font-weight:bold;">
  📄 Download PDF Report
  </a>

  <br>

  <!-- WHATSAPP BUTTON -->
  <a 
  href="https://wa.me/?text=Check%20Review%20Report:%20https://marketingsennna.onrender.com/report" 
  target="_blank"
  style="display:inline-block; margin:10px; padding:12px 20px; background:#25D366; color:white; text-decoration:none; border-radius:8px; font-weight:bold;">
  📤 Send Report on WhatsApp
  </a>

</div>

</div>

<script>

fetch("https://marketingsennna.onrender.com/analytics?key=phanuman"^1Krishna=Radha***")
.then(res=>res.json())
.then(data=>{

const ctx = document.getElementById("chart");

new Chart(ctx, {
  type: "bar",
  data: {
    labels: ["QR", "NFC", "Link"],
    datasets: [{
      label: "Reviews",
      data: [data.qr, data.nfc, data.link]
    }]
  },
  options:{
    responsive:true,
    plugins:{
      legend:{ display:true }
    }
  }
});
  
});

  fetch("https://marketingsennna.onrender.com/daily-report")
.then(res=>res.json())
.then(data=>{
  const labels = Object.keys(data);
  const qr = labels.map(d => data[d].qr);
  const nfc = labels.map(d => data[d].nfc);
  const link = labels.map(d => data[d].link);

  new Chart(document.getElementById("dailyChart"), {
    type: "line",
    data: {
      labels: labels,
      datasets: [
        { label:"QR", data: qr },
        { label:"NFC", data: nfc },
        { label:"Link", data: link }
      ]
    }
  });
});

function generateLink(type){

  const base = "https://marketingsennna.github.io/gmb-review/";

  let link = "";

  if(type === "qr") link = base + "qr.html";
  if(type === "nfc") link = base + "nfc.html";
  if(type === "link") link = base + "link.html";

  document.getElementById("linkOutput").innerText = link;

  navigator.clipboard.writeText(link);

  alert("Link copied ✅");
}
  
</script>

</body>
</html>
