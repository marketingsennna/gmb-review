<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family:sans-serif; padding:20px;">

<h2>Review Analytics</h2>

<canvas id="chart" width="300"></canvas>

<script>

fetch("https://marketingsennna.onrender.com/analytics")
.then(res=>res.json())
.then(data=>{

const ctx = document.getElementById("chart");

new Chart(ctx, {
  type: "bar",
  data: {
    labels: ["QR", "NFC", "Link"],
    datasets: [{
      label: "Reviews",
      data: [data.qr, data.nfc, data.link]
    }]
  }
});

});
</script>

</body>
</html>
