<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Review Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#020617;
  --card:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.08);
  --text:#fff;
  --muted:#94a3b8;
  --primary:#3b82f6;
  --green:#22c55e;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:var(--text);
  display:flex;
  justify-content:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:420px;
  background:var(--card);
  backdrop-filter:blur(18px);
  border-radius:20px;
  padding:20px;
  border:1px solid var(--border);
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* TITLE */
h2{
  text-align:center;
  margin-bottom:20px;
  font-size:20px;
}

/* SECTION */
.section{
  margin-bottom:18px;
}

/* LABEL */
.section label{
  font-size:13px;
  color:var(--muted);
  display:block;
  margin-bottom:6px;
}

/* SERVICES */
.services{
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px;
  max-height:160px;
  overflow-y:auto;
  margin-top:6px;
}

.services label{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  font-size:13px;
  padding:6px;
  cursor:pointer;
  line-height:1.3;
}
  .services label span{
  flex:1;
  text-align:left;
}

.services input{
  order:2; /* 🔥 checkbox right side */
  margin-top:3px;
}

.services label:hover{
  background:rgba(255,255,255,0.05);
}

input[type="checkbox"]{
  accent-color:var(--primary);
}

  .services{
  scrollbar-width:thin;
}

/* INPUTS */
input,select,textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.04);
  color:white;
  font-size:13px;
}
  select option{
  color:black; /* 🔥 FIX */
}

textarea{
  min-height:90px;
}

/* BUTTONS */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

.speak{
  background:linear-gradient(135deg,#22c55e,#16a34a);
}

.generate{
  background:linear-gradient(135deg,#e2e8f0,#cbd5f5);
  color:#020617;
}

button:hover{
  transform:translateY(-1px);
}

/* OUTPUT */
#output{
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Share Your Experience</h2>

<form id="form">

<!-- SERVICES -->
<div class="section">
<label>Select Services</label>

<div class="services">

<label>
  <input type="checkbox" name="services" value="Facebook and Instagram Ads">
  <span>Facebook and Instagram Ads</span>
</label>

<label>
  <input type="checkbox" name="services" value="Lead Generation">
  <span>Lead Generation</span>
</label>

<label>
  <input type="checkbox" name="services" value="Social Media Marketing and Management">
  <span>Social Media Marketing and Management</span>
</label>

<label>
  <input type="checkbox" name="services" value="Digital Marketing">
  <span>Digital Marketing</span>
</label>

<label>
  <input type="checkbox" name="services" value="GMB Management">
  <span>GMB Management</span>
</label>

<label>
  <input type="checkbox" name="services" value="Local SEO">
  <span>Local SEO</span>
</label>

<label>
  <input type="checkbox" name="services" value="Website Development and Design">
  <span>Website Development and Design</span>
</label>

</div>
</div>

<!-- RATING -->
<div class="section">
<label>Select Rating</label>
<select id="rating">
<option value="">Choose rating</option>
<option value="5">⭐⭐⭐⭐⭐ Excellent</option>
<option value="4">⭐⭐⭐⭐ Good</option>
<option value="3">⭐⭐⭐ Average</option>
<option value="2">⭐⭐ Poor</option>
<option value="1">⭐ Very Poor</option>
</select>
</div>

<!-- LOCATION -->
<div class="section">
<label>Location</label>
<input id="location" placeholder="e.g. Vesu, Surat">
</div>

<!-- SPEECH -->
<div class="section">
<button type="button" class="speak" onclick="startListening()">🎤 Speak</button>
<textarea id="inputText" placeholder="Speak or write your experience..."></textarea>
</div>

<!-- SUBMIT -->
<div class="section">
<button type="submit" class="generate">Generate Review</button>
</div>

</form>

<textarea id="output" placeholder="Generated review"></textarea>

</div>

<script>
/* 🔥 SAME JS (UNCHANGED) */
let token="";

fetch("https://marketingsennna.onrender.com/get-token")
.then(res=>res.json())
.then(data=>token=data.token);

let recognition;
let isListening = false;

function startListening(){
  if(isListening){
    recognition.stop();
    isListening = false;
    return;
  }

  recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-IN";
  recognition.continuous = true;
  recognition.interimResults = true;

  let finalTranscript = "";
  let silenceTimer;

  recognition.start();
  isListening = true;

  recognition.onresult = function(event){
    clearTimeout(silenceTimer);

    let interim = "";

    for (let i = event.resultIndex; i < event.results.length; i++) {
      let text = event.results[i][0].transcript;

      if (event.results[i].isFinal) {
        finalTranscript += text + " ";
      } else {
        interim += text;
      }
    }

    document.getElementById("inputText").value =
      finalTranscript + interim;

    silenceTimer = setTimeout(() => {
      recognition.stop();
      isListening = false;
    }, 2000);
  };
}

document.getElementById("form").addEventListener("submit",async(e)=>{
e.preventDefault();

const services = [...document.querySelectorAll('input[name="services"]:checked')].map(el => el.value);
const rating=document.getElementById("rating").value;
const location=document.getElementById("location").value;
const input=document.getElementById("inputText").value;

if(!services.length || !rating || !location || !input){
alert("Fill all fields");
return;
}

if(rating<=3){
alert("Thanks for feedback 🙏");
return;
}

const res=await fetch("https://marketingsennna.onrender.com/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
services,
location,
input,
token
})
});

const data=await res.json();

const output=data.review;

document.getElementById("output").value=output;

navigator.clipboard.writeText(output);

setTimeout(()=>{
window.open("https://search.google.com/local/writereview?placeid=ChIJQWh0uNEbw2MRWT7vlIaLRLQ","_blank");
},800);

});
</script>

</body>
</html>
