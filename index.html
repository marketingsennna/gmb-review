<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Review Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --primary:#2563eb;
  --secondary:#4f46e5;
  --cta:#16a34a;
  --text:#0f172a;
}

/* 🌈 PROPER VISIBLE GRADIENT */
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;
  background:linear-gradient(-45deg,#1e40af,#2563eb,#4f46e5,#0ea5e9);
  background-size:300% 300%;
  animation:gradientBG 18s ease infinite;
  margin:0;
  padding:20px;
}

@keyframes gradientBG{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* 💎 CARD (NO ZOOM EFFECT) */
.container{
  max-width:620px;
  margin:auto;
  background:#ffffff;
  border-radius:20px;
  padding:24px;

  /* 🔥 STRONG 3D SHADOW */
  box-shadow:
    0 25px 60px rgba(0,0,0,0.25),
    0 10px 20px rgba(0,0,0,0.15);
}

/* ❌ REMOVE HOVER ZOOM COMPLETELY */
.container:hover{
  transform:none;
}

/* TEXT */
h1{text-align:center}
.sub{text-align:center;color:#64748b;margin-bottom:20px}
.section{margin-bottom:18px}

/* SERVICES */
  
/* SERVICES */
.services{
  max-height:220px;
  overflow:auto;
  border-radius:12px;
  padding:10px;
  margin-top:10px;
  background:#fff;
  border:1px solid #e2e8f0;
  box-shadow:inset 0 2px 8px rgba(0,0,0,0.05);
}

/* SERVICE ITEM */
.services label{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px;
  border-radius:8px;
  cursor:pointer;

  /* 🔥 spacing */
  margin-bottom:8px;

  /* 🔥 smooth animation */
  transition:all 0.25s ease;
}

/* last item spacing fix */
.services label:last-child{
  margin-bottom:0;
}

/* hover */
.services label:hover{
  background:#eff6ff;
}

/* checkbox */
.services input{
  accent-color:var(--primary);
}

/* 🔥 SELECTED STATE (lift + glow) */
.services label:has(input:checked){
  background:linear-gradient(135deg,#dbeafe,#bfdbfe);
  font-weight:600;
  transform:translateY(-2px);
  box-shadow:0 6px 15px rgba(37,99,235,0.25);
  border:1px solid #93c5fd;
}

/* 🔥 hover + selected combo */
.services label:has(input:checked):hover{
  transform:translateY(-3px) scale(1.01);
  box-shadow:0 10px 25px rgba(37,99,235,0.35);
}

/* 🔥 FIX WIDTH ISSUE (VERY IMPORTANT) */
input[type="text"], 
select, 
textarea, 
button{
  width:100%;
  max-width:100%;
  display:block;
}

/* INPUT */
input[type="text"], select{
  padding:12px;
  border-radius:12px;
  border:1px solid #e2e8f0;
  margin-top:10px;
  box-sizing:border-box;
}

/* TEXTAREA FIX */
textarea{
  height:140px;
  margin-top:8px;
  padding:14px;
  border-radius:14px;
  border:1px solid #e2e8f0;
  background:#fff;
  box-sizing:border-box; /* 🔥 IMPORTANT */
}

/* 🎤 SPEAK BUTTON */
button[type="button"]{
  border:none;
  border-radius:14px;
  padding:14px;
  font-size:15px;
  font-weight:600;
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  color:#fff;
  cursor:pointer;
  margin-top:10px;
  transition:.2s;
}

button[type="button"]:hover{
  box-shadow:0 6px 18px rgba(37,99,235,0.4);
}

/* 🎯 GENERATE BUTTON */
button[type="submit"]{
  border:none;
  border-radius:16px;
  padding:14px;
  font-size:16px;
  font-weight:600;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#fff;
  cursor:pointer;
  margin-top:8px;
  transition:.2s;
}

button[type="submit"]:hover{
  box-shadow:0 10px 25px rgba(34,197,94,0.4);
}

.note{
  font-size:12px;
  color:#64748b;
}

.footer{
  text-align:center;
  font-size:12px;
  color:#64748b;
  margin-top:16px;
}

  /* 🔥 COPY BUTTON PREMIUM STYLE */
.copy-btn{
  margin-top:14px; /* textarea से gap */
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;

  /* 🔥 DARK BLUE + RED GRADIENT */
  background:linear-gradient(135deg,#0f172a,#1e3a8a,#dc2626);
  color:#fff;

  box-shadow:0 6px 20px rgba(0,0,0,0.15);
  transition:all 0.25s ease;
}

/* 🔥 HOVER EFFECT */
.copy-btn:hover{
  transform:translateY(-2px) scale(1.01);
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

/* 🔥 ACTIVE CLICK */
.copy-btn:active{
  transform:scale(0.97);
}

/* 🔥 ATTENTION GLOW */
.copy-btn{
  animation:glowPulse 2s infinite;
}

@keyframes glowPulse{
  0%{ box-shadow:0 0 0 rgba(220,38,38,0.3); }
  50%{ box-shadow:0 0 12px rgba(220,38,38,0.6); }
  100%{ box-shadow:0 0 0 rgba(220,38,38,0.3); }
}
</style>
</head>

<body>

<div class="container">

<h1>Share Your Experience</h1>
<div class="sub">Your review will be generated automatically</div>

<form id="form">

<div class="section">
<label>Select services</label>
<div class="note">You can select multiple services</div>

<div class="services">

<label>Facebook & Instagram Ads <input type="checkbox" name="services" value="Facebook & Instagram Ads"></label>
<label>Lead Generation <input type="checkbox" name="services" value="Lead Generation"></label>
<label>Social Media Marketing & Management <input type="checkbox" name="services" value="Social Media Marketing & Management"></label>
<label>Digital Marketing <input type="checkbox" name="services" value="Digital Marketing"></label>
<label>Google My Business Profile Creation & Optimization <input type="checkbox" name="services" value="Google My Business Profile Creation & Optimization"></label>
<label>GMB Call Verification <input type="checkbox" name="services" value="GMB Call Verification"></label>
<label>GMB Suspension Removal <input type="checkbox" name="services" value="GMB Suspension Removal"></label>
<label>GMB Management <input type="checkbox" name="services" value="GMB Management"></label>
<label>Local SEO <input type="checkbox" name="services" value="Local SEO"></label>
<label>Video Editing <input type="checkbox" name="services" value="Video Editing"></label>
<label>Graphic Design <input type="checkbox" name="services" value="Graphic Design"></label>
<label>WhatsApp Marketing <input type="checkbox" name="services" value="WhatsApp Marketing"></label>
<label>NFC + QR Code Digital Visiting Card <input type="checkbox" name="services" value="NFC + QR Code Digital Visiting Card"></label>
<label>Content Marketing & Writing <input type="checkbox" name="services" value="Content Marketing & Writing"></label>
<label>SEO <input type="checkbox" name="services" value="SEO"></label>
<label>GMB Ads <input type="checkbox" name="services" value="GMB Ads"></label>
<label>Business Consulting <input type="checkbox" name="services" value="Business Consulting"></label>
<label>AI Automation <input type="checkbox" name="services" value="AI Automation"></label>
<label>Advertising & Branding <input type="checkbox" name="services" value="Advertising & Branding"></label>
<label>Website Development & Design <input type="checkbox" name="services" value="Website Development & Design"></label>
<label>Software Development <input type="checkbox" name="services" value="Software Development"></label>
<label>Mobile App Development <input type="checkbox" name="services" value="Mobile App Development"></label>
<label>CRM Development <input type="checkbox" name="services" value="CRM Development"></label>
<label>Landing Page Development <input type="checkbox" name="services" value="Landing Page Development"></label>

</div>
</div>

<div class="section">
<label>Select Rating</label>
<select id="rating">
<option value="">Choose rating</option>
<option value="5">⭐⭐⭐⭐⭐ Excellent</option>
<option value="4">⭐⭐⭐⭐ Good</option>
<option value="3">⭐⭐⭐ Average</option>
<option value="2">⭐⭐ Poor</option>
<option value="1">⭐ Very Poor</option>
</select>
</div>

<div class="section">
<label>Location</label>
<input type="text" id="location" placeholder="e.g. Vesu, Surat">
</div>

<div class="section">
<button type="button" id="micBtn" onclick="startListening()">
🎤 Start Speaking
</button>
<p class="note">Speak your experience</p>
</div>

<div class="section">
<textarea id="inputText" placeholder="Write your experience..."></textarea>
</div>

<div class="section">
<button type="submit" id="generateBtn">Generate Review</button>
</div>

</form>

<textarea id="output" placeholder="Generated review"></textarea>
  
<button id="copyBtn" class="copy-btn" onclick="copyAgain()" style="display:none;">
  Copy Review
</button>
<p class="footer">Your feedback helps others make better decisions</p>

</div>

<script>
const source = localStorage.getItem("source") || "direct";
  
let token = localStorage.getItem("reviewToken") || "";

/* 🔥 TOKEN INIT */
async function initToken(){
  if(!token){
    const res = await fetch("https://marketingsennna.onrender.com/get-token");
    const data = await res.json();

    token = data.token; // 🔥 GLOBAL UPDATE
    localStorage.setItem("reviewToken", token);
  }
}

initToken();

/* 🔥 REFRESH CONTROL */
window.addEventListener("beforeunload", ()=>{
  localStorage.setItem("isReload", "true");
});

window.addEventListener("load", ()=>{
  const isReload = localStorage.getItem("isReload");

  if(isReload){
    let count = parseInt(localStorage.getItem("refreshCount") || "0");
    count++;

    localStorage.setItem("refreshCount", count);

    if(count > 2){
      alert("Session expired. Please scan QR again.");
      localStorage.clear();
      location.reload();
    }
  }

  localStorage.removeItem("isReload");
});

let recognition;
let isListening = false;

function disableUI(){
  const mic = document.getElementById("micBtn");
  const gen = document.getElementById("generateBtn");

  if(mic){
    mic.disabled = true;
    mic.style.opacity = "0.5";
  }

  if(gen){
    gen.disabled = true;
    gen.style.opacity = "0.5";
  }
}

function startListening(){

  const services = [...document.querySelectorAll('input[name="services"]:checked')];
  const rating = document.getElementById("rating").value;
  const location = document.getElementById("location").value;

  if(!services.length){
    alert("Please select at least one service");
    return;
  }

  if(!rating){
    alert("Please select rating");
    return;
  }

  if(!location){
    alert("Please enter location");
    return;
  }

  if(isListening){
    recognition.stop();
    isListening = false;
    document.getElementById("micBtn").innerText = "🎤 Start Speaking";
    return;
  }

  recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

  recognition.lang = "hi-IN";
  recognition.continuous = true;
  recognition.interimResults = true;

  let finalTranscript = "";

  recognition.start();
  isListening = true;

  document.getElementById("micBtn").innerText = "⏹ Stop Recording";

  recognition.onresult = function(event){

    let interim = "";

    for (let i = event.resultIndex; i < event.results.length; i++) {
      let text = event.results[i][0].transcript;

      if (event.results[i].isFinal) {
        finalTranscript += text + " ";
      } else {
        interim += text;
      }
    }

    document.getElementById("inputText").value =
      finalTranscript + interim;
  };

  recognition.onend = function(){
    if(isListening){
      recognition.start();
    } else {
      document.getElementById("micBtn").innerText = "🎤 Start Speaking";
    }
  };
}

/* 🔥 FORM SUBMIT */
document.getElementById("form").addEventListener("submit",async(e)=>{
e.preventDefault();

const services = [...document.querySelectorAll('input[name="services"]:checked')].map(el => el.value);
const rating=document.getElementById("rating").value;
const location=document.getElementById("location").value;
const input=document.getElementById("inputText").value;

if(!services.length){
  alert("Please select at least one service");
  return;
}

if(!rating){
  alert("Please select rating");
  return;
}

if(!location){
  alert("Please enter location");
  return;
}

if(!input){
  alert("Please speak or write your experience");
  return;
}

if(rating<=3){
  alert("Thanks for your feedback 🙏");
  return;
}

  /* 🔥 PREVENT DOUBLE CLICK */
document.getElementById("generateBtn").disabled = true;
document.getElementById("generateBtn").style.opacity = "0.5";

/* 🔥 API CALL */
const res = await fetch("https://marketingsennna.onrender.com/generate",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    services,
    location,
    input,
    token,
    source
  })
});

/* ✅ FIXED (inside function) */
const data = await res.json();

localStorage.setItem("savedReview", data.review);

/* 🔥 ALREADY GENERATED */
if(data.already){
  document.getElementById("output").value = data.review;

  alert("You have already generated review for this QR");

  disableUI();

  return;
}

/* ✅ FIRST TIME SUCCESS */
document.getElementById("output").value=data.review;

document.getElementById("copyBtn").style.display = "none"; // 🔥 first time hide


/* 🔥 AUTO COPY (NO POPUP) */
try{
  await navigator.clipboard.writeText(data.review);
}catch{
  const temp = document.createElement("textarea");
  temp.value = data.review;
  document.body.appendChild(temp);
  temp.select();
  document.execCommand("copy");
  document.body.removeChild(temp);
}

/* 🔥 DIRECT GMB OPEN */
window.location.href = "https://search.google.com/local/writereview?placeid=ChIJQWh0uNEbw2MRWT7vlIaLRLQ";

/* 🔥 DISABLE UI */
disableUI();

}); // FORM SUBMIT CLOSE

/* 🔥 PAGE LOAD CHECK */
window.addEventListener("load", async ()=>{
  const saved = localStorage.getItem("savedReview");

  if(saved){
    const textarea = document.getElementById("output");
    textarea.value = saved;

    /* 🔥 AUTO SELECT TEXT */
    textarea.focus();
    textarea.select();

    /* 🔥 TRY AUTO COPY (may fail silently) */
    try{
      await navigator.clipboard.writeText(saved);
    }catch{
      // ignore (browser block)
    }
     /* 🔥 SHOW COPY BUTTON (ADD HERE) */
    document.getElementById("copyBtn").style.display = "block";
  }
});

/* 🔥 GLOBAL FUNCTION FIX */
window.startListening = startListening;

  function copyAgain(){
  const text = document.getElementById("output").value;

  navigator.clipboard.writeText(text);

  alert("Copied again ✅");

     /* optional hide again */
  document.getElementById("copyBtn").style.display = "none";
}
  
</script>

</body>
</html>
