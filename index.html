<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Review Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  padding:20px;
}
.container{
  max-width:500px;
  margin:auto;
}
textarea,input,select,button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  border:none;
}
button{
  background:#3b82f6;
  color:white;
  cursor:pointer;
}
.speak{background:#22c55e;}
</style>
</head>

<body>

<div class="container">

<h2>Share Your Experience</h2>

<form id="form">

<!-- SERVICES -->
<label>Select Service</label>
<select id="service">
<option value="">Select</option>
<option value="Website Development">Website Development</option>
<option value="SEO">SEO</option>
<option value="Digital Marketing">Digital Marketing</option>
</select>

<!-- RATING -->
<label>Rating</label>
<select id="rating">
<option value="">Select</option>
<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>
</select>

<!-- LOCATION -->
<label>Location</label>
<input id="location" placeholder="e.g. Vesu, Surat">

<!-- SPEECH -->
<button type="button" class="speak" onclick="startListening()">🎤 Speak</button>

<textarea id="inputText" placeholder="Speak or write your experience..."></textarea>

<button type="submit">Generate Review</button>

</form>

<textarea id="output" placeholder="Generated review"></textarea>

</div>

<script>

let token="";

// TOKEN FETCH
fetch("https://marketingsennna.onrender.com/get-token")
.then(res=>res.json())
.then(data=>token=data.token);

// SPEECH
  
let recognition;
let isListening = false;

function startListening(){

  if(isListening){
    recognition.stop();
    isListening = false;
    return;
  }

  recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

  recognition.lang = "en-IN";
  recognition.continuous = true;
  recognition.interimResults = true;

  let finalTranscript = "";
  let silenceTimer;

  recognition.start();
  isListening = true;

  recognition.onresult = function(event){

    clearTimeout(silenceTimer);

    let interim = "";

    for (let i = event.resultIndex; i < event.results.length; i++) {

      let text = event.results[i][0].transcript;

      if (event.results[i].isFinal) {
        finalTranscript += text + " ";
      } else {
        interim += text;
      }
    }

    document.getElementById("inputText").value =
      finalTranscript + interim;

    // 🔥 Silence detect (2 sec)
    silenceTimer = setTimeout(() => {
      recognition.stop();
      isListening = false;
    }, 2000);

  };

  recognition.onerror = function(e){
    console.log("Error:", e.error);
  };

  recognition.onend = function(){
    isListening = false;
  };
}

// FORM
document.getElementById("form").addEventListener("submit",async(e)=>{
e.preventDefault();

const service=document.getElementById("service").value;
const rating=document.getElementById("rating").value;
const location=document.getElementById("location").value;
const input=document.getElementById("inputText").value;

// VALIDATION
if(!service||!rating||!location||!input){
alert("Fill all fields");
return;
}

// LOW RATING STOP
if(rating<=3){
alert("Thanks for feedback 🙏");
return;
}

// API CALL
const res=await fetch("https://marketingsennna.onrender.com/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
service,
location,
input,
token
})
});

const data=await res.json();

const output=data.review;

document.getElementById("output").value=output;

// AUTO COPY
navigator.clipboard.writeText(output);

// OPEN GMB
setTimeout(()=>{
window.open("https://search.google.com/local/writereview?placeid=ChIJQWh0uNEbw2MRWT7vlIaLRLQ","_blank");
},800);

});

</script>

</body>
</html>
