<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Review Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --primary:#2563eb;
  --secondary:#7c3aed;
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e5e7eb;
}

*{box-sizing:border-box}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;
  background:linear-gradient(135deg,#eef2ff,#f8fafc);
  margin:0;
  padding:20px;
  color:var(--text);
}

/* CONTAINER */
.container{
  max-width:620px;
  margin:auto;
  background:var(--card);
  border-radius:20px;
  padding:24px;
  box-shadow:0 15px 40px rgba(0,0,0,.08);
}

h1{text-align:center}
.sub{text-align:center;color:var(--muted);margin-bottom:20px}

.section{margin-bottom:20px}

/* 🌈 SERVICES ULTRA UI */
.services{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.services label{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px;
  border-radius:14px;
  cursor:pointer;
  background:linear-gradient(135deg,#ffffff,#f1f5f9);
  border:1px solid var(--border);
  transition:.25s;
}

/* hover */
.services label:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 15px rgba(0,0,0,0.06);
}

/* checkbox right */
.services input{
  margin-left:10px;
  accent-color:var(--primary);
}

/* selected card */
.services label:has(input:checked){
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  color:#fff;
  border:none;
  box-shadow:0 10px 25px rgba(37,99,235,0.3);
}

/* INPUT */
input[type="text"], select{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  margin-top:10px;
}

/* TEXTAREA */
textarea{
  width:100%;
  height:140px;
  margin-top:8px; /* 🔥 reduced */
  padding:14px;
  border-radius:14px;
  border:1px solid var(--border);
  background:#f8fafc;
}

/* BUTTON */
button{
  width:100%;
  border:none;
  border-radius:16px;
  padding:14px;
  font-size:16px;
  font-weight:600;
  background:linear-gradient(135deg,#16a34a,#22c55e); /* 🔥 DIFFERENT COLOR */
  color:#fff;
  cursor:pointer;
  margin-top:8px; /* 🔥 gap control */
  transition:.2s;
}

button:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.note{font-size:12px;color:var(--muted)}
.footer{text-align:center;font-size:12px;color:var(--muted);margin-top:16px}

</style>
</head>

<body>

<div class="container">

<h1>Share Your Experience</h1>
<div class="sub">Your review will be generated automatically</div>

<form id="form">

<div class="section">
<label>Select services</label>
<div class="note">You can select multiple services</div>

<div class="services">
<label>Facebook & Instagram Ads <input type="checkbox" name="services" value="Facebook & Instagram Ads"></label>
<label>Lead Generation <input type="checkbox" name="services" value="Lead Generation"></label>
<label>Social Media Marketing <input type="checkbox" name="services" value="Social Media Marketing"></label>
<label>Digital Marketing <input type="checkbox" name="services" value="Digital Marketing"></label>
<label>Google My Business <input type="checkbox" name="services" value="GMB"></label>
<label>Local SEO <input type="checkbox" name="services" value="Local SEO"></label>
<label>Video Editing <input type="checkbox" name="services" value="Video Editing"></label>
<label>Graphic Design <input type="checkbox" name="services" value="Graphic Design"></label>
<label>WhatsApp Marketing <input type="checkbox" name="services" value="WhatsApp Marketing"></label>
<label>SEO <input type="checkbox" name="services" value="SEO"></label>
<label>Business Consulting <input type="checkbox" name="services" value="Business Consulting"></label>
<label>Website Development <input type="checkbox" name="services" value="Website Development"></label>
</div>
</div>

<div class="section">
<label>Select Rating</label>
<select id="rating">
<option value="">Choose rating</option>
<option value="5">⭐⭐⭐⭐⭐ Excellent</option>
<option value="4">⭐⭐⭐⭐ Good</option>
<option value="3">⭐⭐⭐ Average</option>
<option value="2">⭐⭐ Poor</option>
<option value="1">⭐ Very Poor</option>
</select>
</div>

<div class="section">
<label>Location</label>
<input type="text" id="location" placeholder="e.g. Vesu, Surat">
</div>

<div class="section">
<button type="button">🎤 Speak</button>
<p class="note">Speak your experience</p>
</div>

<div class="section">
<textarea id="inputText" placeholder="Write your experience..."></textarea>
</div>

<div class="section">
<button type="submit">Generate Review</button>
</div>

</form>

<textarea id="output" placeholder="Generated review"></textarea>

<p class="footer">Your feedback helps others make better decisions</p>

</div>

<script>
/* 🔥 SAME JS (UNCHANGED) */
let token="";

fetch("https://marketingsennna.onrender.com/get-token")
.then(res=>res.json())
.then(data=>token=data.token);

let recognition;
let isListening = false;

function startListening(){
  if(isListening){
    recognition.stop();
    isListening = false;
    return;
  }

  recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-IN";
  recognition.continuous = true;
  recognition.interimResults = true;

  let finalTranscript = "";
  let silenceTimer;

  recognition.start();
  isListening = true;

  recognition.onresult = function(event){
    clearTimeout(silenceTimer);

    let interim = "";

    for (let i = event.resultIndex; i < event.results.length; i++) {
      let text = event.results[i][0].transcript;

      if (event.results[i].isFinal) {
        finalTranscript += text + " ";
      } else {
        interim += text;
      }
    }

    document.getElementById("inputText").value =
      finalTranscript + interim;

    silenceTimer = setTimeout(() => {
      recognition.stop();
      isListening = false;
    }, 2000);
  };
}

document.getElementById("form").addEventListener("submit",async(e)=>{
e.preventDefault();

const services = [...document.querySelectorAll('input[name="services"]:checked')].map(el => el.value);
const rating=document.getElementById("rating").value;
const location=document.getElementById("location").value;
const input=document.getElementById("inputText").value;

if(!services.length || !rating || !location || !input){
alert("Fill all fields");
return;
}

if(rating<=3){
alert("Thanks for feedback 🙏");
return;
}

const res=await fetch("https://marketingsennna.onrender.com/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
services,
location,
input,
token
})
});

const data=await res.json();

const output=data.review;

document.getElementById("output").value=output;

navigator.clipboard.writeText(output);

setTimeout(()=>{
window.open("https://search.google.com/local/writereview?placeid=ChIJQWh0uNEbw2MRWT7vlIaLRLQ","_blank");
},800);

});
</script>

</body>
</html>
