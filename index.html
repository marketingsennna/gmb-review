<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Review Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  padding:20px;
}
.container{
  max-width:500px;
  margin:auto;
}
textarea,input,select,button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  border:none;
}
button{
  background:#3b82f6;
  color:white;
  cursor:pointer;
}
.speak{background:#22c55e;}
</style>
</head>

<body>

<div class="container">

<h2>Share Your Experience</h2>

<form id="form">

<!-- SERVICES -->
 <label>Select services</label>
<div class="services">
<label><input type="checkbox" name="services" value="Facebook and Instagram Ads"> Facebook and Instagram Ads</label>
    <label><input type="checkbox" name="services" value="Lead Generation"> Lead Generation</label>
    <label><input type="checkbox" name="services" value="Social Media Marketing and Management"> Social Media Marketing and Management</label>
    <label><input type="checkbox" name="services" value="Digital Marketing"> Digital Marketing</label>
    <label><input type="checkbox" name="services" value="Google My Business Profile Creation and Optimization"> Google My Business Profile Creation and Optimization</label>
    <label><input type="checkbox" name="services" value="GMB Call Verification"> GMB Call Verification</label>
    <label><input type="checkbox" name="services" value="GMB Suspension Removal"> GMB Suspension Removal</label>
    <label><input type="checkbox" name="services" value="GMB Management"> GMB Management</label>
    <label><input type="checkbox" name="services" value="Local SEO"> Local SEO</label>
    <label><input type="checkbox" name="services" value="Video Editing"> Video Editing</label>
    <label><input type="checkbox" name="services" value="Graphic Design"> Graphic Design</label>
    <label><input type="checkbox" name="services" value="WhatsApp Marketing"> WhatsApp Marketing</label>
    <label><input type="checkbox" name="services" value="NFC and QR Code Digital Visiting Card"> NFC and QR Code Digital Visiting Card</label>
    <label><input type="checkbox" name="services" value="Content Writing"> Content Writing</label>
    <label><input type="checkbox" name="services" value="SEO"> SEO</label>
    <label><input type="checkbox" name="services" value="GMB Ads"> GMB Ads</label>
    <label><input type="checkbox" name="services" value="Business Consulting"> Business Consulting</label>
    <label><input type="checkbox" name="services" value="AI Automation"> AI Automation</label>
    <label><input type="checkbox" name="services" value="Advertising and Branding"> Advertising and Branding</label>
    <label><input type="checkbox" name="services" value="Website Development and Design"> Website Development and Design</label>
    <label><input type="checkbox" name="services" value="Software Development"> Software Development</label>
    <label><input type="checkbox" name="services" value="Mobile App Development"> Mobile App Development</label>
    <label><input type="checkbox" name="services" value="CRM Development"> CRM Development</label>
    <label><input type="checkbox" name="services" value="Landing Page Development"> Landing Page Development</label>
</div>
</div>


<!-- RATING -->
<label>Select Rating</label>
  <select id="rating">
    <option value="">Choose rating</option>
    <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
    <option value="4">⭐⭐⭐⭐ Good</option>
    <option value="3">⭐⭐⭐ Average</option>
    <option value="2">⭐⭐ Poor</option>
    <option value="1">⭐ Very Poor</option>
  </select>

<!-- LOCATION -->
<label>Location</label>
<input id="location" placeholder="e.g. Vesu, Surat">

<!-- SPEECH -->
<button type="button" class="speak" onclick="startListening()">🎤 Speak</button>

<textarea id="inputText" placeholder="Speak or write your experience..."></textarea>

<button type="submit">Generate Review</button>

</form>

<textarea id="output" placeholder="Generated review"></textarea>

</div>

<script>

let token="";

// TOKEN FETCH
fetch("https://marketingsennna.onrender.com/get-token")
.then(res=>res.json())
.then(data=>token=data.token);

// SPEECH
  
let recognition;
let isListening = false;

function startListening(){

  if(isListening){
    recognition.stop();
    isListening = false;
    return;
  }

  recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

  recognition.lang = "en-IN";
  recognition.continuous = true;
  recognition.interimResults = true;

  let finalTranscript = "";
  let silenceTimer;

  recognition.start();
  isListening = true;

  recognition.onresult = function(event){

    clearTimeout(silenceTimer);

    let interim = "";

    for (let i = event.resultIndex; i < event.results.length; i++) {

      let text = event.results[i][0].transcript;

      if (event.results[i].isFinal) {
        finalTranscript += text + " ";
      } else {
        interim += text;
      }
    }

    document.getElementById("inputText").value =
      finalTranscript + interim;

    // 🔥 Silence detect (2 sec)
    silenceTimer = setTimeout(() => {
      recognition.stop();
      isListening = false;
    }, 2000);

  };

  recognition.onerror = function(e){
    console.log("Error:", e.error);
  };

  recognition.onend = function(){
    isListening = false;
  };
}

// FORM
document.getElementById("form").addEventListener("submit",async(e)=>{
e.preventDefault();

const services = [...document.querySelectorAll('input[name="services"]:checked')].map(el => el.value);
const rating=document.getElementById("rating").value;
const location=document.getElementById("location").value;
const input=document.getElementById("inputText").value;

// VALIDATION
if(!services.length || !rating || !location || !input){
alert("Fill all fields");
return;
}

// LOW RATING STOP
if(rating<=3){
alert("Thanks for feedback 🙏");
return;
}

// API CALL
const res=await fetch("https://marketingsennna.onrender.com/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
services,
location,
input,
token
})
});

const data=await res.json();

const output=data.review;

document.getElementById("output").value=output;

// AUTO COPY
navigator.clipboard.writeText(output);

// OPEN GMB
setTimeout(()=>{
window.open("https://search.google.com/local/writereview?placeid=ChIJQWh0uNEbw2MRWT7vlIaLRLQ","_blank");
},800);

});

</script>

</body>
</html>
