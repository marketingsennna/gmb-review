<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Review Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --primary:#2563eb;   /* trust blue */
  --secondary:#0ea5e9; /* light blue */
  --cta:#16a34a;       /* green CTA */
  --bg:#f1f5f9;
  --text:#0f172a;
  --muted:#64748b;
}

*{box-sizing:border-box}

/* 🌈 CLEAN PROFESSIONAL GRADIENT */
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;
  background:linear-gradient(135deg,#e0f2fe,#eef2ff,#f8fafc);
  margin:0;
  padding:20px;
  color:var(--text);
}

/* CONTAINER */
.container{
  max-width:620px;
  margin:auto;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(12px);
  border-radius:18px;
  padding:24px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
  text-align:center;
  color:var(--text);
}

.sub{
  text-align:center;
  color:var(--muted);
  margin-bottom:20px;
}

.section{margin-bottom:18px}

/* ✅ SERVICES DROPDOWN */
.services{
  max-height:220px;
  overflow:auto;
  border-radius:12px;
  padding:10px;
  margin-top:10px;
  background:#fff;
  border:1px solid #e2e8f0;
}

/* rows */
.services label{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  transition:.2s;
  color:var(--text);
}

/* hover */
.services label:hover{
  background:#f1f5f9;
}

/* checkbox */
.services input{
  accent-color:var(--primary);
}

/* selected */
.services label:has(input:checked){
  background:#dbeafe;
  font-weight:600;
}

/* INPUT */
input[type="text"], select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #e2e8f0;
  margin-top:10px;
  background:#fff;
  color:var(--text);
}

/* TEXTAREA */
textarea{
  width:100%;
  height:140px;
  margin-top:8px;
  padding:14px;
  border-radius:12px;
  border:1px solid #e2e8f0;
  background:#fff;
  color:var(--text);
}

/* 🎯 CTA BUTTON (GREEN = CONVERSION) */
button{
  width:100%;
  border:none;
  border-radius:14px;
  padding:14px;
  font-size:16px;
  font-weight:600;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#fff;
  cursor:pointer;
  margin-top:8px;
  transition:.2s;
}

button:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

.note{
  font-size:12px;
  color:var(--muted);
}

.footer{
  text-align:center;
  font-size:12px;
  color:var(--muted);
  margin-top:16px;
}
</style>
</head>

<body>

<div class="container">

<h1>Share Your Experience</h1>
<div class="sub">Your review will be generated automatically</div>

<form id="form">

<div class="section">
<label>Select services</label>
<div class="note">You can select multiple services</div>

<div class="services">

<label>Facebook & Instagram Ads <input type="checkbox"></label>
<label>Lead Generation <input type="checkbox"></label>
<label>Social Media Marketing & Management <input type="checkbox"></label>
<label>Digital Marketing <input type="checkbox"></label>
<label>Google My Business Profile Creation & Optimization <input type="checkbox"></label>
<label>GMB Call Verification <input type="checkbox"></label>
<label>GMB Suspension Removal <input type="checkbox"></label>
<label>GMB Management <input type="checkbox"></label>
<label>Local SEO <input type="checkbox"></label>
<label>Video Editing <input type="checkbox"></label>
<label>Graphic Design <input type="checkbox"></label>
<label>WhatsApp Marketing <input type="checkbox"></label>
<label>NFC + QR Code Digital Visiting Card <input type="checkbox"></label>
<label>Content Marketing & Writing <input type="checkbox"></label>
<label>SEO <input type="checkbox"></label>
<label>GMB Ads <input type="checkbox"></label>
<label>Business Consulting <input type="checkbox"></label>
<label>AI Automation <input type="checkbox"></label>
<label>Advertising & Branding <input type="checkbox"></label>
<label>Website Development & Design <input type="checkbox"></label>
<label>Software Development <input type="checkbox"></label>
<label>Mobile App Development <input type="checkbox"></label>
<label>CRM Development <input type="checkbox"></label>
<label>Landing Page Development <input type="checkbox"></label>

</div>
</div>

<div class="section">
<label>Select Rating</label>
<select id="rating">
<option value="">Choose rating</option>
<option value="5">⭐⭐⭐⭐⭐ Excellent</option>
<option value="4">⭐⭐⭐⭐ Good</option>
<option value="3">⭐⭐⭐ Average</option>
<option value="2">⭐⭐ Poor</option>
<option value="1">⭐ Very Poor</option>
</select>
</div>

<div class="section">
<label>Location</label>
<input type="text" placeholder="e.g. Vesu, Surat">
</div>

<div class="section">
<button type="button">🎤 Speak</button>
<p class="note">Speak your experience</p>
</div>

<div class="section">
<textarea placeholder="Write your experience..."></textarea>
</div>

<div class="section">
<button type="submit">Generate Review</button>
</div>

</form>

<textarea placeholder="Generated review"></textarea>

<p class="footer">Your feedback helps others make better decisions</p>

</div>

<script>
/* 🔥 SAME JS (UNCHANGED) */
let token="";

fetch("https://marketingsennna.onrender.com/get-token")
.then(res=>res.json())
.then(data=>token=data.token);

let recognition;
let isListening = false;

function startListening(){
  if(isListening){
    recognition.stop();
    isListening = false;
    return;
  }

  recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-IN";
  recognition.continuous = true;
  recognition.interimResults = true;

  let finalTranscript = "";
  let silenceTimer;

  recognition.start();
  isListening = true;

  recognition.onresult = function(event){
    clearTimeout(silenceTimer);

    let interim = "";

    for (let i = event.resultIndex; i < event.results.length; i++) {
      let text = event.results[i][0].transcript;

      if (event.results[i].isFinal) {
        finalTranscript += text + " ";
      } else {
        interim += text;
      }
    }

    document.getElementById("inputText").value =
      finalTranscript + interim;

    silenceTimer = setTimeout(() => {
      recognition.stop();
      isListening = false;
    }, 2000);
  };
}

document.getElementById("form").addEventListener("submit",async(e)=>{
e.preventDefault();

const services = [...document.querySelectorAll('input[name="services"]:checked')].map(el => el.value);
const rating=document.getElementById("rating").value;
const location=document.getElementById("location").value;
const input=document.getElementById("inputText").value;

if(!services.length || !rating || !location || !input){
alert("Fill all fields");
return;
}

if(rating<=3){
alert("Thanks for feedback 🙏");
return;
}

const res=await fetch("https://marketingsennna.onrender.com/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
services,
location,
input,
token
})
});

const data=await res.json();

const output=data.review;

document.getElementById("output").value=output;

navigator.clipboard.writeText(output);

setTimeout(()=>{
window.open("https://search.google.com/local/writereview?placeid=ChIJQWh0uNEbw2MRWT7vlIaLRLQ","_blank");
},800);

});
</script>

</body>
</html>
