<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Review Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{
  --primary:#2563eb;
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e5e7eb;
}

*{box-sizing:border-box}

body{
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;
  background: linear-gradient(135deg,#f8fafc,#eef2ff);
  margin:0;
  padding:20px;
  color:var(--text);
}

.container{
  max-width:620px;
  margin:auto;
  background:var(--card);
  border-radius:18px;
  padding:24px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
  font-size:22px;
  text-align:center;
  margin:0 0 6px;
}

.sub{
  text-align:center;
  color:var(--muted);
  font-size:14px;
  margin-bottom:20px;
}

.section{
  margin-bottom:22px;
}

.section label{
  font-weight:600;
  font-size:14px;
}

.note{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}

/* ✅ SERVICES FIX */
.services{
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px;
  max-height:260px;
  overflow:auto;
  margin-top:10px;
}

.services label{
  display:flex;
  align-items:center;
  padding:6px 0;
  font-size:14px;
  cursor:pointer;
}

.services span{
  flex:1;
}

.services input{
  margin-left:auto;
  accent-color:var(--primary);
}

/* INPUT */
input[type="text"], select{
  width:100%;
  padding:12px 14px;
  border-radius:10px;
  border:1px solid var(--border);
  margin-top:10px;
  font-size:14px;
}

select option{
  color:black;
}

input[type="text"]:focus{
  outline:none;
  border-color:var(--primary);
}

/* BUTTON */
button{
  width:100%;
  border:none;
  border-radius:14px;
  padding:14px;
  font-size:16px;
  font-weight:600;
  background:var(--primary);
  color:#fff;
  cursor:pointer;
  transition:.2s;
}

button:hover{opacity:.9}

/* TEXTAREA */
textarea{
  width:100%;
  height:150px;
  margin-top:14px;
  padding:14px;
  border-radius:12px;
  border:1px solid var(--border);
  font-size:14px;
  background:#f9fafb;
}

.footer{
  text-align:center;
  margin-top:16px;
  font-size:12px;
  color:var(--muted);
}
</style>
 
</head>

<body>

<div class="container">

<h1>Share Your Experience</h1>
<p class="sub">Help others by sharing your feedback</p>

<form id="form">

<!-- SERVICES -->
<div class="section">
<label>Select Services</label>

<div class="services">

<label>
  <span>Facebook and Instagram Ads</span>
  <input type="checkbox" name="services">
</label>

<label>
  <span>Lead Generation</span>
  <input type="checkbox" name="services">
</label>

<label>
  <span>Social Media Marketing and Management</span>
  <input type="checkbox" name="services">
</label>

<label>
  <span>Digital Marketing</span>
  <input type="checkbox" name="services">
</label>

<label>
  <span>GMB Management</span>
  <input type="checkbox" name="services">
</label>

<label>
  <span>Local SEO</span>
  <input type="checkbox" name="services">
</label>

<label>
  <span>Website Development and Design</span>
  <input type="checkbox" name="services">
</label>

</div>
</div>

<!-- RATING -->
<div class="section">
<label>Select Rating</label>
<select id="rating">
<option value="">Choose rating</option>
<option value="5">⭐⭐⭐⭐⭐ Excellent</option>
<option value="4">⭐⭐⭐⭐ Good</option>
<option value="3">⭐⭐⭐ Average</option>
<option value="2">⭐⭐ Poor</option>
<option value="1">⭐ Very Poor</option>
</select>
</div>

<!-- LOCATION -->
<div class="section">
<label>Location</label>
<input type="text" id="location" placeholder="e.g. Vesu, Surat">
</div>

<!-- SPEAK -->
<div class="section">
<button type="button" onclick="startListening()">🎤 Speak</button>
<p class="note">Speak your experience</p>
</div>

<!-- TEXTAREA -->
<div class="section">
<textarea id="inputText" placeholder="Write your experience..."></textarea>
</div>

<!-- GENERATE -->
<div class="section">
<button type="submit">Generate Review</button>
</div>

</form>

<!-- OUTPUT -->
<textarea id="output" placeholder="Generated review"></textarea>

<p class="footer">Your feedback helps others make better decisions</p>

</div>

<script>
/* 🔥 SAME JS (UNCHANGED) */
let token="";

fetch("https://marketingsennna.onrender.com/get-token")
.then(res=>res.json())
.then(data=>token=data.token);

let recognition;
let isListening = false;

function startListening(){
  if(isListening){
    recognition.stop();
    isListening = false;
    return;
  }

  recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-IN";
  recognition.continuous = true;
  recognition.interimResults = true;

  let finalTranscript = "";
  let silenceTimer;

  recognition.start();
  isListening = true;

  recognition.onresult = function(event){
    clearTimeout(silenceTimer);

    let interim = "";

    for (let i = event.resultIndex; i < event.results.length; i++) {
      let text = event.results[i][0].transcript;

      if (event.results[i].isFinal) {
        finalTranscript += text + " ";
      } else {
        interim += text;
      }
    }

    document.getElementById("inputText").value =
      finalTranscript + interim;

    silenceTimer = setTimeout(() => {
      recognition.stop();
      isListening = false;
    }, 2000);
  };
}

document.getElementById("form").addEventListener("submit",async(e)=>{
e.preventDefault();

const services = [...document.querySelectorAll('input[name="services"]:checked')].map(el => el.value);
const rating=document.getElementById("rating").value;
const location=document.getElementById("location").value;
const input=document.getElementById("inputText").value;

if(!services.length || !rating || !location || !input){
alert("Fill all fields");
return;
}

if(rating<=3){
alert("Thanks for feedback 🙏");
return;
}

const res=await fetch("https://marketingsennna.onrender.com/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
services,
location,
input,
token
})
});

const data=await res.json();

const output=data.review;

document.getElementById("output").value=output;

navigator.clipboard.writeText(output);

setTimeout(()=>{
window.open("https://search.google.com/local/writereview?placeid=ChIJQWh0uNEbw2MRWT7vlIaLRLQ","_blank");
},800);

});
</script>

</body>
</html>
